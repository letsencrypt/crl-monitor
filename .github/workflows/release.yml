# Run the release flow
# Keep in sync with try-release.yml

name: Run release
on:
  push:
    tags:
      - v*

permissions:
  contents: read
  id-token: write # Needed to request JWT for OIDC

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
          cache: false
      - run: ./build-release.sh
      # Upload to S3:
      - uses: aws-actions/configure-aws-credentials@e7f100cf4c008499ea8adda475de1042d6975c7b # v6.2.0
        with:
          role-to-assume: arn:aws:iam::338276578713:role/crl-monitor-github-action-role
          aws-region: us-west-2
      - run: aws s3 cp build/checker.zip s3://crl-monitor-artifacts/${GITHUB_REF_NAME}/
      - run: aws s3 cp build/churner.zip s3://crl-monitor-artifacts/${GITHUB_REF_NAME}/
